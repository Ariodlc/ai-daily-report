site_name: AI智能日报
site_description: 每天自动收集AI、考研、材料、新能源、政策等领域最新信息
site_author: AI Assistant
site_url: https://yourusername.github.io/ai-daily-report/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式

    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search

nav:
  - 今日日报: index.md
  - 历史归档:
    - archive/index.md
  - 领域分类:
    - ai-tech.md
    - kaoyan.md
    - materials.md
    - new-energy.md
    - policy.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/ai-daily-report
  generator: false

copyright: Copyright &copy; 2026 AI Daily Report
